<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧉 Matecito</title>
  <link rel="icon" type="image/png" href="LaCasaRadio Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:     #2d6a2d;
      --verde-mid: #3d8b3d;
      --verde-claro: #c8e6c9;
      --crema:     #f5f0e8;
      --marron:    #5c3d1e;
      --marron-claro: #a0704a;
      --texto:     #1a1a1a;
      --gris:      #888;
      --sombra:    rgba(0,0,0,0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--crema);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── PANTALLA DE ROL ── */
    #pantalla-rol {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      padding: 2rem;
    }

    .titulo-principal {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      color: var(--verde);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .subtitulo {
      font-size: 1rem;
      color: var(--gris);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .mate-emoji {
      font-size: 5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .pregunta-rol {
      font-size: 1.1rem;
      color: var(--marron);
      font-weight: 500;
    }

    .botones-rol {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-rol {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 0 var(--sombra);
    }

    .btn-rol:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--sombra); }

    .btn-cebador {
      background: var(--verde);
      color: #fff;
    }
    .btn-cebador:hover { background: var(--verde-mid); }

    .btn-tomador {
      background: var(--marron);
      color: #fff;
    }
    .btn-tomador:hover { background: var(--marron-claro); }

    .ocupado-msg {
      font-size: 0.85rem;
      color: #c0392b;
      min-height: 1.2em;
    }

    /* ── PANTALLA PRINCIPAL ── */
    #pantalla-main {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    .header-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .titulo-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--verde);
      letter-spacing: 0.04em;
    }

    .badge-rol {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.8rem;
      border-radius: 99px;
      color: #fff;
    }
    .badge-rol.cebador { background: var(--verde); }
    .badge-rol.tomador  { background: var(--marron); }

    /* Estado conexión */
    .estado-conexion {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--gris);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.4s;
    }
    .dot.online  { background: #27ae60; }
    .dot.offline { background: #e74c3c; }

    /* Botón acción */
    .btn-accion {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.06em;
      padding: 1.4rem 3rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
      box-shadow: 0 5px 0 var(--sombra);
      width: 100%;
      max-width: 360px;
    }

    .btn-accion:active  { transform: translateY(3px); box-shadow: 0 2px 0 var(--sombra); }
    .btn-accion:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-accion.cebador-btn { background: var(--marron); color: #fff; }
    .btn-accion.tomador-btn { background: var(--verde);  color: #fff; }

    /* Feedback */
    .feedback {
      font-size: 0.95rem;
      color: var(--gris);
      min-height: 1.4em;
      font-style: italic;
    }

    /* Alerta entrante */
    #alerta-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #alerta-overlay.visible { display: flex; }

    .alerta-box {
      background: var(--crema);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 300px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .alerta-icono-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .alerta-icono-ring.verde  { background: #c8e6c9; }
    .alerta-icono-ring.marron { background: #f5e6d0; }

    .alerta-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--texto);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .alerta-desc { font-size: 0.88rem; color: var(--gris); line-height: 1.5; }

    .alerta-progress {
      width: 100%;
      height: 3px;
      background: rgba(0,0,0,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .alerta-progress-fill {
      height: 100%;
      border-radius: 99px;
      animation: shrink 3s linear forwards;
    }
    .alerta-progress-fill.verde  { background: #2d6a2d; }
    .alerta-progress-fill.marron { background: #5c3d1e; }

    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }

    .btn-cerrar-alerta {
      margin-top: 0.25rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      padding: 0.55rem 2rem;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      letter-spacing: 0.05em;
      width: 100%;
    }
    .btn-cerrar-alerta.verde  { background: #2d6a2d; color: #fff; }
    .btn-cerrar-alerta.marron { background: #5c3d1e; color: #fff; }

    /* salir */
    .btn-salir {
      font-size: 0.75rem;
      color: var(--gris);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 1rem;
    }

    /* logo esquina */
    .logo-esquina {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.2s;
      z-index: 50;
    }
    .logo-esquina:hover { opacity: 1; }
  </style>
</head>
<body>

<img src="LaCasaRadio Logo.png" alt="La Casa Radio" class="logo-esquina">

<!-- PANTALLA ELEGIR ROL -->
<div id="pantalla-rol">
  <div class="mate-emoji">🧉</div>
  <div class="titulo-principal">Matecito</div>
  <div class="subtitulo">Sistema de control de la ronda</div>
  <p class="pregunta-rol">¿Quién sos hoy?</p>
  <div class="botones-rol">
    <button class="btn-rol btn-cebador" onclick="elegirRol('cebador')">☕ Cebador</button>
    <button class="btn-rol btn-tomador" onclick="elegirRol('tomador')">🤲 Tomador</button>
  </div>
  <p class="ocupado-msg" id="msg-ocupado"></p>
</div>

<!-- PANTALLA PRINCIPAL -->
<div id="pantalla-main">
  <div class="header-main">
    <div class="titulo-main">🧉 Matecito</div>
    <span class="badge-rol" id="badge-rol-texto"></span>
  </div>

  <div class="estado-conexion">
    <div class="dot" id="dot-otro"></div>
    <span id="label-otro">Esperando al otro...</span>
  </div>

  <button class="btn-accion" id="btn-principal" onclick="enviarSenal()" disabled>
    —
  </button>

  <p class="feedback" id="feedback-texto"></p>

  <button class="btn-salir" onclick="salir()">Cambiar rol</button>
</div>

<!-- ALERTA ENTRANTE -->
<div id="alerta-overlay">
  <div class="alerta-box">
    <div class="alerta-icono-ring" id="alerta-ring">
      <span id="alerta-emoji"></span>
    </div>
    <div class="alerta-titulo" id="alerta-titulo"></div>
    <div class="alerta-desc"   id="alerta-desc"></div>
    <div class="alerta-progress"><div class="alerta-progress-fill" id="alerta-progress-fill"></div></div>
    <button class="btn-cerrar-alerta" id="btn-cerrar-alerta" onclick="cerrarAlerta()">—</button>
  </div>
</div>

  function sonidoCebado() {
    const audio = new Audio(AUDIO_CEBADO_B64);
    audio.play().catch(() => {});
  }

  const audioCtx = () => new (window.AudioContext || window.webkitAudioContext)();

  function sonidoBocina() {
    const ctx = audioCtx();
    const dur = 1.6;
    // Bocina: dos osciladores desafinados + modulación
    [220, 277].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.25, ctx.currentTime + dur - 0.15);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + dur);
    });
  }

  // ── Roles en Firebase ──
  const rolesRef    = ref(db, "roles");
  const senalRef    = ref(db, "senal");

  window.elegirRol = async function(rol) {
    // Leer roles actuales
    onValue(rolesRef, snap => {}, { onlyOnce: false }); // primer ping
    const snapshot = await new Promise(res => onValue(rolesRef, res, { onlyOnce: true }));
    const roles = snapshot.val() || {};

    const opuesto = rol === "cebador" ? "tomador" : "cebador";
    if (roles[rol]) {
      document.getElementById("msg-ocupado").textContent =
        `El rol "${rol}" ya está ocupado. Esperá o elegí el otro.`;
      return;
    }

    // Registrar mi rol
    await set(ref(db, `roles/${rol}`), true);
    miRol = rol;

    // Limpiar al cerrar/recargar
    window.addEventListener("beforeunload", () => set(ref(db, `roles/${miRol}`), null));

    mostrarPantallaMain();
    escucharOtro();
    escucharSenal();
    pedirPermisoNotificaciones();
  };

  function mostrarPantallaMain() {
    document.getElementById("pantalla-rol").style.display  = "none";
    document.getElementById("pantalla-main").style.display = "flex";

    const badge = document.getElementById("badge-rol-texto");
    badge.textContent = miRol === "cebador" ? "☕ Cebador" : "🤲 Tomador";
    badge.className   = `badge-rol ${miRol}`;

    const btn = document.getElementById("btn-principal");
    if (miRol === "cebador") {
      btn.textContent = "🚛 Devolveme el mate";
      btn.className   = "btn-accion cebador-btn";
    } else {
      btn.textContent = "🧉 Pedir mate";
      btn.className   = "btn-accion tomador-btn";
    }
  }

  function escucharOtro() {
    const opuesto = miRol === "cebador" ? "tomador" : "cebador";
    onValue(ref(db, `roles/${opuesto}`), snap => {
      const online = !!snap.val();
      document.getElementById("dot-otro").className  = `dot ${online ? "online" : "offline"}`;
      document.getElementById("label-otro").textContent = online
        ? `${opuesto.charAt(0).toUpperCase() + opuesto.slice(1)} conectado ✓`
        : `Esperando al ${opuesto}...`;
      document.getElementById("btn-principal").disabled = !online;
    });
  }

  function escucharSenal() {
    onValue(senalRef, snap => {
      const data = snap.val();
      if (!data || data.para !== miRol) return;

      // Consumir la señal
      remove(senalRef);

      if (data.tipo === "pedir") {
        sonidoCebado();
        mostrarAlerta("🧉", "¡A cebar!", "El tomador está esperando el mate.", "verde");
      } else if (data.tipo === "devolver") {
        sonidoBocina();
        mostrarAlerta("🚛", "¡Devolvé el mate!", "El cebador quiere la pava de vuelta.", "marron");
      }
    });
  }

  window.enviarSenal = async function() {
    const btn = document.getElementById("btn-principal");
    const fb  = document.getElementById("feedback-texto");
    btn.disabled = true;

    if (miRol === "tomador") {
      await set(senalRef, { tipo: "pedir", para: "cebador" });
      fb.textContent = "Señal enviada. El cebador ya sabe 🧉";
    } else {
      await set(senalRef, { tipo: "devolver", para: "tomador" });
      fb.textContent = "Camión en camino. Esperá la devolución 🚛";
    }

    setTimeout(() => {
      fb.textContent = "";
      btn.disabled = false;
    }, 3000);
  };

  function mostrarAlerta(emoji, titulo, desc, color) {
    document.getElementById("alerta-emoji").textContent  = emoji;
    document.getElementById("alerta-titulo").textContent = titulo;
    document.getElementById("alerta-desc").textContent   = desc;
    document.getElementById("alerta-ring").className     = `alerta-icono-ring ${color}`;
    document.getElementById("alerta-progress-fill").className = `alerta-progress-fill ${color}`;
    document.getElementById("btn-cerrar-alerta").className    = `btn-cerrar-alerta ${color}`;
    document.getElementById("btn-cerrar-alerta").textContent  = color === "verde" ? "Ya voy 🧉" : "Ahora va 🚛";
    document.getElementById("alerta-overlay").classList.add("visible");

    // Autocierre a los 3 segundos
    clearTimeout(window._alertaTimer);
    window._alertaTimer = setTimeout(cerrarAlerta, 3000);

    // Notificación nativa si la pestaña no está activa
    if (document.hidden && Notification.permission === "granted") {
      new Notification(titulo, { body: desc, icon: "LaCasaRadio Logo.png" });
    }
  }

  window.cerrarAlerta = function() {
    document.getElementById("alerta-overlay").classList.remove("visible");
    clearTimeout(window._alertaTimer);
  };

  // Pedir permiso de notificaciones al elegir rol
  function pedirPermisoNotificaciones() {
    if (Notification.permission === "default") Notification.requestPermission();
  }

  window.salir = async function() {
    if (miRol) await set(ref(db, `roles/${miRol}`), null);
    miRol = null;
    document.getElementById("pantalla-main").style.display = "none";
    document.getElementById("pantalla-rol").style.display  = "flex";
    document.getElementById("msg-ocupado").textContent     = "";
  };
</script>
